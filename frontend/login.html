<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Login - Veterinary Care</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card auth-card-compact">
      <div class="auth-head">
        <p class="eyebrow auth-eyebrow-dark">Owner Access</p>
        <h1>Veterinary Care Portal</h1>
        <p class="auth-message">Sign in or create your account to continue.</p>
      </div>

      <div class="auth-grid auth-grid-compact">
        <form id="loginForm" class="auth-form auth-form-login compact">
          <h2>Sign In</h2>
          <input id="loginContact" type="text" placeholder="Contact" required />
          <input id="loginPassword" type="password" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>

        <form id="registerForm" class="auth-form auth-form-register compact">
          <h2>Create Account</h2>
          <input id="registerName" type="text" placeholder="Owner Name" required />
          <input id="registerContact" type="text" placeholder="Contact" required />
          <input id="registerPassword" type="password" placeholder="Password" required />
          <button type="submit">Register</button>
        </form>
      </div>

      <p id="authStatus" class="auth-message auth-status-box"></p>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
